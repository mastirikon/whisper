services:
  backend:
    build:
      context: ./backend
    image: whisper-backend
    container_name: whisper-backend
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?set SECRET_KEY in .env}
      UI_USERNAME: ${UI_USERNAME:?set UI_USERNAME in .env}
      UI_PASSWORD: ${UI_PASSWORD:?set UI_PASSWORD in .env}
      AUTH_TOKEN_TTL_SECONDS: ${AUTH_TOKEN_TTL_SECONDS:-2592000}
      WHISPER_MODEL: ${WHISPER_MODEL:-turbo}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cpu}
      WHISPER_BATCH_SIZE: ${WHISPER_BATCH_SIZE:-8}
      WHISPER_WARMUP: ${WHISPER_WARMUP:-true}
      WHISPER_DEFAULT_BEAM_SIZE: ${WHISPER_DEFAULT_BEAM_SIZE:-3}
      WHISPER_DEFAULT_VAD: ${WHISPER_DEFAULT_VAD:-true}
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-104857600}
    volumes:
      # Кэш моделей whisper: ~6 ГБ для turbo. Без него каждый рестарт = повторное скачивание.
      - whisper-cache:/home/appuser/.cache/whisper
    networks:
      - app-net  # только для общения с frontend, наружу не торчит
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    image: whisper-frontend
    container_name: whisper-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - app-net        # чтобы проксировать /api/ в backend
      - proxy_network  # чтобы NPM мог проксировать домен → этот контейнер по имени
    # Никаких ports: — наружу только через NPM по proxy_network

networks:
  app-net:
    driver: bridge
  proxy_network:
    external: true   # сеть NPM, уже существует на Lenovo

volumes:
  whisper-cache:
